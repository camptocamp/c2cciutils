strictness: veryhigh
max-line-length: 110

pylint:
  disable:
    - wrong-import-order
    - too-many-arguments
    - too-many-branches
    - too-many-locals
    - too-many-statements
    - too-many-nested-blocks
    - too-few-public-methods

pep8:
  options:
    max-line-length: 110
  disable:
    - E203 # whitespace before ':'

mypy:
  run: true

mccabe:
  run: false
